<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PagePilot</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background: #f8fafc;
        color: #111827;
        margin: 0;
        max-width: 320px;
        min-width: 320px;
        overflow-x: hidden;
        width: 320px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      .wrap {
        display: grid;
        gap: 14px;
        max-width: 320px;
        min-width: 0;
        overflow-x: hidden;
        padding: 16px;
        width: 320px;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 10px;
        min-width: 0;
      }

      .brand img {
        border-radius: 14px;
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
        height: 42px;
        flex: 0 0 auto;
        width: 42px;
      }

      .brand div {
        min-width: 0;
      }

      h1 {
        font-size: 17px;
        line-height: 1.1;
        margin: 0;
      }

      p {
        color: #64748b;
        font-size: 12.5px;
        line-height: 1.45;
        margin: 3px 0 0;
      }

      .status {
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 16px;
        display: grid;
        gap: 10px;
        min-width: 0;
        overflow: hidden;
        padding: 12px;
      }

      .best {
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(15, 159, 143, 0.08));
        border: 1px solid rgba(37, 99, 235, 0.14);
        border-radius: 14px;
        display: grid;
        gap: 3px;
        min-width: 0;
        overflow: hidden;
        padding: 10px;
      }

      .best span {
        color: #0f766e;
        font-size: 10.5px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .best strong {
        display: block;
        font-size: 13px;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .best p {
        font-size: 11.5px;
        margin: 0;
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .stats {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, 1fr);
      }

      .stat {
        background: #f8fafc;
        border-radius: 12px;
        padding: 8px;
      }

      .stat strong {
        display: block;
        font-size: 15px;
      }

      .stat span {
        color: #64748b;
        display: block;
        font-size: 11px;
        margin-top: 1px;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      .secondary-actions {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      button {
        align-items: center;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        font: inherit;
        font-size: 13px;
        font-weight: 750;
        justify-content: center;
        min-height: 40px;
        min-width: 0;
        padding: 10px 12px;
        text-align: center;
        white-space: normal;
      }

      button:disabled {
        cursor: default;
        opacity: 0.46;
      }

      button:not(:disabled) {
        transition: transform 140ms ease, filter 140ms ease, background-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
      }

      button:not(:disabled):hover {
        filter: brightness(0.96);
        transform: translateY(-1px);
      }

      button:not(:disabled):active {
        filter: brightness(0.9);
        transform: translateY(0) scale(0.98);
      }

      button:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.4);
        outline-offset: 3px;
      }

      .primary {
        background: #111827;
        color: #ffffff;
        min-height: 44px;
      }

      .secondary {
        background: #e8eef7;
        color: #1f2937;
      }

      .hint {
        color: #64748b;
        font-size: 11.5px;
        line-height: 1.4;
        margin: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0f172a;
          color: #f8fafc;
        }

        p,
        .stat span,
        .hint {
          color: #a6b1c2;
        }

        .status {
          background: #111827;
          border-color: rgba(226, 232, 240, 0.12);
        }

        .stat {
          background: #0f172a;
        }

        .best {
          background: rgba(15, 23, 42, 0.82);
          border-color: rgba(226, 232, 240, 0.12);
        }

        .best span {
          color: #5eead4;
        }

        .primary {
          background: #f8fafc;
          color: #111827;
        }

        .secondary {
          background: rgba(226, 232, 240, 0.12);
          color: #f8fafc;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="brand">
        <img src="assets/icons/icon48.png" alt="" aria-hidden="true">
        <div>
          <h1>PagePilot</h1>
          <p>Navigate long pages and AI chats.</p>
        </div>
      </section>

      <section class="status">
        <div class="best" aria-label="Best section">
          <span id="bestLabel">Best start</span>
          <strong id="bestTitle">Not scanned yet</strong>
          <p id="bestReason">Open a long page or AI conversation, then jump to the useful part.</p>
        </div>

        <div class="stats" aria-label="Current page stats">
          <div class="stat">
            <strong id="sections">--</strong>
            <span>sections</span>
          </div>
          <div class="stat">
            <strong id="important">--</strong>
            <span>important</span>
          </div>
          <div class="stat">
            <strong id="words">--</strong>
            <span>words</span>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="jumpUseful" type="button" title="Jump to useful part (Alt+J / Option+J)">Jump to useful part</button>
          <div class="secondary-actions">
            <button class="secondary" id="nextImportant" type="button" title="Next important section (Alt+N / Option+N)">Next</button>
            <button class="secondary" id="openSidebar" type="button">Sidebar</button>
            <button class="secondary" id="rescanPage" type="button">Rescan</button>
          </div>
        </div>

        <p class="hint" id="message">PagePilot works locally. No signup, no API calls, no page content leaves your browser.</p>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
